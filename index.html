<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notre Agenda</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,800;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg">

  <div class="legend-grid">
    <div class="leg-item">
      <div class="leg-circle" style="background:#6a9e1f;"></div>
      <div class="leg-name">Atelier</div>
    </div>
    <div class="leg-item">
      <div class="leg-circle" style="background:#3a7a5a;"></div>
      <div class="leg-name">Sortie nature</div>
    </div>
    <div class="leg-item">
      <div class="leg-circle" style="background:#9b3030;"></div>
      <div class="leg-name">Conférence</div>
    </div>
    <div class="leg-item">
      <div class="leg-circle" style="background:#4a8ab0;"></div>
      <div class="leg-name">ValMares</div>
    </div>
    <div class="leg-item">
      <div class="leg-circle" style="background:#1a6644;"></div>
      <div class="leg-name">Réserve Naturelle</div>
    </div>
    <div class="leg-item">
      <div class="leg-circle" style="background:#e07820;"></div>
      <div class="leg-name">Zéro pesticide</div>
    </div>
  </div>

  <div class="cal-card">
    <div class="cal-nav">
      <button class="nav-btn" id="prev">&#9664;</button>
      <div class="cal-title">Notre Agenda</div>
      <div class="cal-month" id="month-label">Mai 2026</div>
      <button class="nav-btn" id="next">&#9654;</button>
    </div>

    <div class="cal-grid" id="cal-grid">
      <div class="dow">Lun</div>
      <div class="dow">Mar</div>
      <div class="dow">Mer</div>
      <div class="dow">Jeu</div>
      <div class="dow">Ven</div>
      <div class="dow">Sam</div>
      <div class="dow">Dim</div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
